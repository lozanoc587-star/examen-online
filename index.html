<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Examen de Seguridad</title>

<style>
body{
  font-family:Segoe UI,Arial,sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  margin:0;padding:0;
}
.contenedor{
  max-width:900px;margin:40px auto;
  background:white;padding:30px;border-radius:14px;
}
h1{text-align:center;color:#003366;}
.pregunta{margin-bottom:20px;}
#bloqueado{display:none;background:#b00020;color:white;padding:40px;text-align:center;border-radius:14px;}
#adWarning{display:none;background:#fff3cd;border-left:6px solid #ff9800;padding:15px;margin-bottom:15px;}
</style>
</head>

<body>

<div class="contenedor" id="examen">
<h1>Examen de Seguridad – Contratistas</h1>

<div id="adWarning">
⚠️ ADVERTENCIA:  
No cambies de pestaña. Al segundo intento el examen se bloqueará.
</div>

<div class="pregunta">
<h3>Nombre completo</h3>
<input type="text" id="nombre">
</div>

<div id="preguntas">
<div class="pregunta">¿Objetivo del EPP?<br><input></div>
<div class="pregunta">Equipo obligatorio<br><input></div>
<div class="pregunta">¿Qué hacer ante un incidente?<br><input></div>
</div>

<button onclick="enviar()">Enviar</button>
</div>

<div id="bloqueado">
🚫 <strong>EXAMEN BLOQUEADO</strong><br><br>
Tu intento fue registrado y el examen quedó invalidado.
</div>

<script>
let cambios = sessionStorage.getItem("cambiosVentana") ? Number(sessionStorage.getItem("cambiosVentana")) : 0;
let bloqueado = sessionStorage.getItem("bloqueado") === "true";

/* ---- SHUFFLE PREGUNTAS (excepto nombre) ---- */
function mezclarPreguntas(){
  const cont=document.getElementById("preguntas");
  [...cont.children].sort(()=>Math.random()-0.5).forEach(e=>cont.appendChild(e));
}

/* ---- BLOQUEO SI YA ESTABA BLOQUEADO ---- */
if(bloqueado){
  document.getElementById("examen").style.display="none";
  document.getElementById("bloqueado").style.display="block";
}else{
  mezclarPreguntas();
}

/* ---- CAMBIO DE PESTAÑA ---- */
document.addEventListener("visibilitychange",()=>{
  if(document.hidden&&!bloqueado){
    cambios++;
    sessionStorage.setItem("cambiosVentana", cambios);
    if(cambios===1){
      document.getElementById("adWarning").style.display="block";
    }
    if(cambios>=2){
      bloquear("doble_cambio_ventana");
    }
  }
});

/* ---- RECARGA = BLOQUEO TOTAL ---- */
window.addEventListener("beforeunload",()=>{
  if(!bloqueado){
    sessionStorage.setItem("bloqueado","true");
  }
});

/* ---- BLOQUEO DEFINITIVO ---- */
function bloquear(motivo){
  sessionStorage.setItem("bloqueado","true");
  document.getElementById("examen").style.display="none";
  document.getElementById("bloqueado").style.display="block";
}

/* ---- ENVÍO ---- */
function enviar(){
  if(sessionStorage.getItem("bloqueado")==="true")return;
  alert("Examen enviado");
}
</script>

</body>
</html>
